name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: danteev/texlive:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python virtualenv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install recipemd

      - name: Validate recipes
        run: make check

      - name: Build PDF
        run: make pdf

      - uses: actions/upload-artifact@v4
        with:
          name: cookbook-pdf
          path: build/pdf/cookbook.pdf
